const NOTES={"컴퓨터홍대":"원장 미참여 (사업부 참여 과열)","컴퓨터천안":"금액·인원 확인예정","컴퓨터청주":"원장 5만원 참여 → 사업부 1명 추가","게임천안":"원장 5만원 참여 → 사업부 1명 추가","게임안산":"원장 5만원 참여 → 사업부 1명 추가","게임신촌":"금액 미회신 대기중","뷰티신촌":"펫강남 사업부 2.5만원 참가","뷰티인천":"게임안산 원장 5만원 참여 → 사업부 1명 추가","뷰티수원":"부원장 미참여 → 사업부 1명 추가","뷰티천안":"금액·인원 다름 확인예정","승무원부산":"원장만 참여"};
const 계열COLOR={"컴퓨터":"b-blue","뷰티":"b-pink","요리":"b-amber","게임":"b-teal","승무원":"b-purple","펫":"b-coral"};
function fmt(n){return n.toLocaleString('ko-KR');}
const root=document.getElementById('root');
Object.entries(DATA).forEach(([계열,branches])=>{
  const totalCount=Object.values(branches).reduce((s,a)=>s+a.length,0);
  const totalFee=Object.values(branches).reduce((s,a)=>s+a.reduce((ss,m)=>ss+(m.참가비||0),0),0);
  const block=document.createElement('div');
  block.className='계열-block';
  block.innerHTML=`<div class="계열-header"><span class="계열-badge ${계열COLOR[계열]||'b-blue'}">${계열}</span><span class="계열-name">${계열} 계열</span><span class="계열-total">${Object.keys(branches).length}개 지점 · ${totalCount}명 · ${fmt(totalFee)}원</span></div>`;
  Object.entries(branches).forEach(([branch,members])=>{
    const fee=members.reduce((s,m)=>s+(m.참가비||0),0);
    const note=NOTES[branch]||'';
    const bDiv=document.createElement('div');
    bDiv.className='branch';
    const hdr=document.createElement('div');
    hdr.className='branch-header';
    hdr.innerHTML=`<span class="branch-name">${branch}</span><span class="branch-count">${members.length}명</span><span class="branch-fee">&nbsp;${fmt(fee)}원</span>${note?'<span class="note-tag">비고</span>':''}<span class="chevron">▶</span>`;
    const list=document.createElement('div');
    list.className='member-list';
    let html=note?`<div class="branch-note">⚠ ${note}</div>`:'';
    html+='<div class="member-grid">';
    members.forEach(m=>{html+=`<div class="member-item"><span class="member-name">${m.이름}</span><span class="member-rank">${m.직급}</span></div>`;});
    html+='</div>';
    list.innerHTML=html;
    hdr.addEventListener('click',()=>{const o=list.classList.toggle('open');hdr.querySelector('.chevron').classList.toggle('open',o);});
    bDiv.appendChild(hdr);bDiv.appendChild(list);block.appendChild(bDiv);
  });
  root.appendChild(block);
});
</script>
